<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitação de Materiais</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: #e5e5e5;

  display: flex;
  justify-content: center;
  align-items: center; /* CENTRALIZA VERTICAL */
  min-height: 100vh;   /* ocupa tela toda */
  margin: 0;
}

/* CARD PRINCIPAL */
.container {
  background: rgba(40, 40, 40, 0.65);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(200, 200, 200, 0.2);
  border-radius: 20px;

  width: 100%;
  max-width: 420px;
  padding: 25px;

  box-shadow: 0 0 25px rgba(200, 200, 200, 0.2);
  animation: fadeIn 0.8s ease;
}

/* LOGO */
img {
  width: 130px;
  display: block;
  margin: 0 auto 15px;
  filter: drop-shadow(0 0 10px rgba(200, 200, 200, 0.6));
}

/* TITULO */
h2 {
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  margin-top: 12px;
  padding: 10px;

  border-radius: 10px;
  border: 1px solid #444;

  background: rgba(0,0,0,0.6);
  color: #e5e5e5;

  outline: none;
  transition: 0.3s;
}

/* EFEITO FOCO PRATA */
input:focus, select:focus, textarea:focus {
  border: 1px solid #c0c0c0;
  box-shadow: 0 0 10px #c0c0c0;
}

/* BOTÃO FUTURISTA PRATA */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;

  border-radius: 12px;
  border: none;

  background: linear-gradient(90deg, #c0c0c0, #e5e5e5);
  color: black;
  font-weight: bold;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #c0c0c0;
}

/* CANVAS */
canvas {
  background: rgba(255,255,255,0.95);
  border-radius: 12px;
  margin-top: 10px;

  box-shadow: 0 0 10px rgba(200, 200, 200, 0.4);
}

/* TITULOS DE SEÇÃO */
h3 {
  text-align: center;
  margin-top: 20px;
  color: #d1d5db;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}  </style>
</head>

<body>

<div class="container" id="recibo">

  <img src="assets/vegaslogo1.jpg">

  <h2>Solicitação de Materiais</h2>

  <input type="text" id="nome" placeholder="Nome do Solicitante">
  <input type="text" id="posto" placeholder="Posto de Serviço">

  <select id="material">
    <option value="">Material</option>
    <option>Uniforme</option>
    <option>Rádio</option>
    <option>Lanterna</option>
  </select>

  <input type="number" id="quantidade" placeholder="Quantidade">
  <textarea id="obs" placeholder="Observações"></textarea>

  <h3>Assinatura</h3>
  <canvas id="assinatura" width="350" height="150"></canvas>

  <button onclick="limpar()">Limpar Assinatura</button>
  <button onclick="gerarPDF()">Gerar Recibo em PDF</button>

</div>

<script>
  const canvas = document.getElementById("assinatura");
  const ctx = canvas.getContext("2d");

  let desenhando = false;

  canvas.addEventListener("mousedown", () => desenhando = true);
  canvas.addEventListener("mouseup", () => desenhando = false);
  canvas.addEventListener("mousemove", desenhar);

  function desenhar(e) {
    if (!desenhando) return;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  }

  function limpar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  async function gerarPDF() {
    const { jsPDF } = window.jspdf;

    const elemento = document.getElementById("recibo");

    const canvasImg = await html2canvas(elemento);
    const imgData = canvasImg.toDataURL("image/png");

    const pdf = new jsPDF();

    pdf.addImage(imgData, "PNG", 10, 10, 180, 0);

    pdf.save("recibo_materiais.pdf");
  }
</script>

</body>
</html>
