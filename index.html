<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Materiais</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #000);
            color: #e5e5e5;

            display: flex;
            justify-content: center;
            align-items: center;
            /* CENTRALIZA VERTICAL */
            min-height: 100vh;
            /* ocupa tela toda */
            margin: 0;
        }

        /* CARD PRINCIPAL */
        .container {
            background: rgba(40, 40, 40, 0.65);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(200, 200, 200, 0.2);
            border-radius: 20px;

            width: 100%;
            max-width: 420px;
            padding: 25px;

            box-shadow: 0 0 25px rgba(200, 200, 200, 0.2);
            animation: fadeIn 0.8s ease;

            .container {
                position: relative;
            }

            input:focus,
            select:focus,
            textarea:focus {
                transform: translateY(-2px);
            }

            .container::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 20px;
                padding: 1px;
                background: linear-gradient(120deg, rgba(255, 255, 255, 0.4), transparent);
                -webkit-mask:
                    linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
            }
        }

        /* LOGO */
        img {
            width: 130px;
            display: block;
            margin: 0 auto 15px;
            filter: drop-shadow(0 0 10px rgba(200, 200, 200, 0.6));
        }

        /* TITULO */
        h2 {
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* INPUTS */
        input,
        select,
        textarea {
            width: 93%;
            margin-top: 12px;
            padding: 10px;

            border-radius: 10px;
            border: 1px solid #444;

            background: rgba(0, 0, 0, 0.6);
            color: #e5e5e5;

            outline: none;
            transition: 0.3s;
        }

        /* PADRONIZA TODOS OS ELEMENTOS */
        .container canvas,
        .container button {
            width: 100%;
            max-width: 350px;
            display: block;
            margin: 10px auto;
        }

        /* EFEITO FOCO PRATA */
        input:focus,
        select:focus,
        textarea:focus {
            border: 1px solid #c0c0c0;
            box-shadow: 0 0 10px #c0c0c0;
        }

        /* BOTÃO FUTURISTA PRATA */
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #c0c0c0, #e5e5e5);
            color: black;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* brilho animado */
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #c0c0c0;
        }

        /* CANVAS */
        canvas {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            margin-top: 10px;

            box-shadow: 0 0 10px rgba(200, 200, 200, 0.4);
        }

        canvas {
            height: 150px;
        }

        /* TITULOS DE SEÇÃO */
        h3 {
            text-align: center;
            margin-top: 20px;
            color: #d1d5db;
        }

        /* ANIMAÇÃO */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }


        }
    </style>
</head>

<body>

    <div class="container" id="recibo">

        <img src="assets/vegaslogo1.jpg">

        <h2>Solicitação de Materiais</h2>

        <input type="text" id="nome" placeholder="Nome do Supervisor">

        <select id="cidade" onchange="carregarPostos()">
            <option value="">Selecione a Cidade</option>

            <option value="Queimados">Queimados</option>
            <option value="Três Rios">Três Rios</option>
            <option value="Volta Redonda">Volta Redonda</option>
            <option value="Barra Mansa">Barra Mansa</option>
            <option value="Nova Iguaçu">Nova Iguaçu</option>
            <option value="Resende">Resende</option>
            <option value="Barra do Piraí">Barra do Piraí</option>
            <option value="Sapucaia">Sapucaia</option>
            <option value="Miguel Pereira">Miguel Pereira</option>
            <option value="Valença">Valença</option>
            <option value="Pinheiral">Pinheiral</option>
            <option value="Porto Real">Porto Real</option>
            <option value="Piraí">Piraí</option>
        </select>
        <!-- POSTO -->
        <select id="posto">
            <option value="">Selecione o Posto</option>
        </select>

        </select>
        <select id="material">
            <option value="">Material</option>
            <option>Uniforme</option>
            <option>Rádio</option>
            <option>Lanterna</option>
        </select>

        <input type="number" id="quantidade" placeholder="Quantidade">
        <textarea id="obs" placeholder="Observações"></textarea>

        <h3>Assinatura</h3>
        <canvas id="assinatura"></canvas>

        <p style="text-align:center; font-size:12px; opacity:0.6;">  </p>      

        <button onclick="limpar()">Limpar Assinatura</button>
        <button onclick="gerarPDF()">Gerar Recibo em PDF</button>

    </div>

    <script>
        const canvas = document.getElementById("assinatura");
        const ctx = canvas.getContext("2d");

        let desenhando = false;

        canvas.addEventListener("mousedown", () => desenhando = true);
        canvas.addEventListener("mouseup", () => desenhando = false);
        canvas.addEventListener("mousemove", desenhar);

        function desenhar(e) {
            if (!desenhando) return;
            ctx.lineWidth = 2;
            ctx.lineCap = "round";

            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function limpar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf;

            const nome = document.getElementById("nome").value;
            const posto = document.getElementById("posto").value;
            const material = document.getElementById("material").value;
            const quantidade = document.getElementById("quantidade").value;
            const obs = document.getElementById("obs").value;

            const assinatura = document.getElementById("assinatura").toDataURL();

            const pdf = new jsPDF();

            pdf.setFontSize(16);
            pdf.text("RECIBO DE SOLICITAÇÃO DE MATERIAIS", 20, 20);

            pdf.setFontSize(12);

            pdf.text(`Nome: ${nome}`, 20, 40);
            pdf.text(`Posto: ${posto}`, 20, 50);
            pdf.text(`Material: ${material}`, 20, 60);
            pdf.text(`Quantidade: ${quantidade}`, 20, 70);
            pdf.text(`Observações: ${obs}`, 20, 80);

            pdf.text("Assinatura:", 20, 100);

            pdf.addImage(assinatura, "PNG", 20, 105, 80, 40);

            pdf.save("recibo.pdf");
        }
        const dados = {
            "Queimados": ["Lanlimp"],

            "Três Rios": ["Royal", "Ceneged"],

            "Volta Redonda": [
                "Nagumo", "Royal Vila Sta Cecilia", "Royal Retiro", "Royal Sessenta",
                "Royal Aterrado", "Royal Amaral Peixoto", "Vincol", "Gerdau",
                "Projeto Vida", "Edifício Cecisa", "Condomínio Maximum",
                "Sind. Met. Sul Fluminense", "A. Abreu Beneficiamento",
                "Arena Emirados", "Transporte Exelsior", "Economy", "Gran Milano"
            ],

            "Barra Mansa": [
                "Royal Centro", "Royal Boa Vista", "Ceneged", "Ceneged",
                "Transporte Exelsior", "Estik Filmes", "Expresso Massa Falida", "Rede Aliança"
            ],

            "Nova Iguaçu": ["Royal"],

            "Resende": [
                "Tachi-S Brasil", "Nagumo", "Brabus",
                "Zen Cozinha Oriental", "Udiaço", "Scapini"
            ],

            "Barra do Piraí": ["MCI Reciclagem"],
            "Sapucaia": ["Ceneged"],
            "Miguel Pereira": ["Ceneged"],
            "Valença": ["Ceneged"],
            "Pinheiral": ["Norsil", "Perfiaço"],
            "Porto Real": ["Vila Vitória"],
            "Piraí": ["Peter", "Mata Amador"]
        };

        function carregarPostos() {
            const cidade = document.getElementById("cidade").value;
            const select = document.getElementById("posto");

            select.innerHTML = '<option value="">Selecione o Posto</option>';

            if (dados[cidade]) {
                dados[cidade].forEach(posto => {
                    const option = document.createElement("option");
                    option.value = posto;
                    option.textContent = posto;
                    select.appendChild(option);
                });
            }
        }

    </script>

</body>

</html>
